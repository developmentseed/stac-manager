name: Deploy Github Pages

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:

env:
  PUBLIC_URL: ${{ vars.PUBLIC_URL }}
  REACT_APP_STAC_API: ${{ vars.REACT_APP_STAC_API }}
  REACT_APP_STAC_BROWSER: ${{ vars.REACT_APP_STAC_BROWSER }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache dist
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-dist
        with:
          path: packages/client/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Install
        run: npm ci

      - name: Create .env file
        run: mv packages/client/.env.example packages/client/.env

      - name: Setup SPA on Github Pages
        run: node packages/client/tasks/setup-gh-pages.mjs

      - name: Set app version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run all:build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Restore dist cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-dist
        with:
          path: packages/client/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          clean: true
          clean-exclude: index.yaml
          single-commit: true
          folder: packages/client/dist
