name: Deploy Github Pages

on:
  push:
    branches:
    - 'main'

env:
  PUBLIC_URL: ${{ vars.PUBLIC_URL }}
  REACT_APP_STAC_API: ${{ vars.REACT_APP_STAC_API }}
  REACT_APP_STAC_BROWSER: ${{ vars.REACT_APP_STAC_BROWSER }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package.json') }}

      - name: Cache dist
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-dist
        with:
          path: packages/client/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Install
        run: npm install

      - name: Create .env file
        run: mv packages/client/.env.example packages/client/.env

      - name: Setup SPA on Github Pages
        run: node packages/client/tasks/setup-gh-pages.mjs

      - name: Build
        run: npm run all:build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore dist cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-dist
        with:
          path: packages/client/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          clean: true
          clean-exclude: index.yaml
          single-commit: true
          folder: packages/client/dist
