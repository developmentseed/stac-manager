# Deploys the client to Cloudflare Pages for every deployable ref:
#
#   - pull request branches  -> pr-<number>.<project>.pages.dev (preview)
#   - push to main           -> main.<project>.pages.dev (staging)
#   - published releases     -> <project>.pages.dev (production)
#
# The Cloudflare Pages project must have its production branch set to
# "release"; the "main" branch alias then serves as a stable staging URL and
# every PR gets an isolated preview. Builds run here (direct upload via
# wrangler) rather than through Cloudflare's git integration because the
# monorepo needs `plugins:build` before the client build and pulls its env
# vars from repository variables.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - API token with the Cloudflare Pages:Edit scope
#   CLOUDFLARE_ACCOUNT_ID  - target Cloudflare account
#
# Optional repository variable:
#   CLOUDFLARE_PAGES_PROJECT - Pages project name (default: stac-manager)
#
# Note for OIDC setups: preview URLs are per-PR, so the OIDC client needs a
# wildcard redirect URI covering https://*.<project>.pages.dev, or previews
# run with auth disabled.

name: Deploy Cloudflare Pages

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - 'main'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - staging
          - production
        default: staging

env:
  # Cloudflare Pages serves every deployment from the domain root.
  PUBLIC_URL: ''
  REACT_APP_STAC_API: ${{ vars.REACT_APP_STAC_API }}
  REACT_APP_STAC_BROWSER: ${{ vars.REACT_APP_STAC_BROWSER }}
  PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'stac-manager' }}

# One in-flight deploy per ref; a newer commit supersedes the older build.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      # Map the trigger onto a wrangler branch. The Pages project's
      # production branch is "release"; everything else is a preview alias.
      - name: Resolve deployment target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          case "$EVENT_NAME" in
            pull_request)
              branch="pr-${PR_NUMBER}"
              ;;
            push)
              branch="main"
              ;;
            release)
              branch="release"
              ;;
            workflow_dispatch)
              if [ "$INPUT_ENVIRONMENT" = production ]; then
                branch="release"
              else
                branch="main"
              fi
              ;;
          esac
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package.json') }}

      - name: Install
        run: npm install

      - name: Create .env file
        run: mv packages/client/.env.example packages/client/.env

      - name: Build
        run: npm run all:build

      - name: Add SPA redirects
        run: printf '/* /index.html 200\n' > packages/client/dist/_redirects

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ steps.target.outputs.branch }}
        run: |
          npx wrangler@4 pages deploy packages/client/dist \
            --project-name="$PAGES_PROJECT" \
            --branch="$BRANCH" \
            --commit-hash="$(git rev-parse HEAD)" \
            --commit-dirty=true | tee deploy.log
          url=$(grep -Eo 'https://[a-z0-9.-]+\.pages\.dev' deploy.log | tail -n1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # Keep a single up-to-date preview-URL comment on the PR.
      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ steps.target.outputs.branch }}
          URL: ${{ steps.deploy.outputs.url }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker='<!-- cf-pages-preview -->'
          alias_url="https://${BRANCH}.${PAGES_PROJECT}.pages.dev"
          body="${marker}
          ### Cloudflare Pages preview

          | Latest deploy | Branch alias |
          |---|---|
          | ${URL} | ${alias_url} |

          Built from ${SHA}."
          comment_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="$body"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$body"
          fi
