# Dispatches a GitHub Deployment for every deployable ref:
#
#   - pull request branches  -> per-PR "preview-pr-<number>" environment
#   - push to main (staging) -> "staging" environment
#   - published releases     -> "production" environment
#
# Each run builds and pushes the Docker image for the exact commit being
# deployed, then creates a GitHub Deployment whose payload carries the
# immutable (digest-pinned) image reference. The actual rollout is left to
# whatever operates the environments — a webhook listener, Argo CD, or a
# follow-up workflow subscribed to `deployment` events — which should update
# the deployment status as it progresses.
#
# Preview deployments are marked transient and are deactivated when the PR
# closes.

name: Dispatch Deployment

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed
  push:
    branches:
      - 'main'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - staging
          - production
        default: staging

# One in-flight dispatch per ref; a newer commit supersedes the older build.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  # Map the trigger onto an environment and the commit to deploy.
  resolve:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.target.outputs.environment }}
      sha: ${{ steps.target.outputs.sha }}
      transient: ${{ steps.target.outputs.transient }}
      production: ${{ steps.target.outputs.production }}
    steps:
      - name: Resolve deployment target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          SHA: ${{ github.sha }}
        run: |
          case "$EVENT_NAME" in
            pull_request)
              environment="preview-pr-${PR_NUMBER}"
              sha="$PR_HEAD_SHA"
              ;;
            push)
              environment="staging"
              sha="$SHA"
              ;;
            release)
              environment="production"
              sha="$SHA"
              ;;
            workflow_dispatch)
              environment="$INPUT_ENVIRONMENT"
              sha="$SHA"
              ;;
          esac
          {
            echo "environment=$environment"
            echo "sha=$sha"
            echo "transient=${{ github.event_name == 'pull_request' }}"
            echo "production=$([ "$environment" = production ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  # Build and push the image for the deployed commit so the rollout target is
  # immutable and independent of branch movement.
  build-push:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      image: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Create the GitHub Deployment that downstream automation acts on.
  dispatch:
    needs:
      - resolve
      - build-push
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          DEPLOY_SHA: ${{ needs.resolve.outputs.sha }}
          IMAGE: ${{ needs.build-push.outputs.image }}
          TRANSIENT: ${{ needs.resolve.outputs.transient }}
          PRODUCTION: ${{ needs.resolve.outputs.production }}
        with:
          script: |
            const { ENVIRONMENT, DEPLOY_SHA, IMAGE, TRANSIENT, PRODUCTION } =
              process.env;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: DEPLOY_SHA,
              environment: ENVIRONMENT,
              auto_merge: false,
              // Checks run in parallel with this workflow; don't fail the
              // dispatch because they haven't reported yet.
              required_contexts: [],
              transient_environment: TRANSIENT === 'true',
              production_environment: PRODUCTION === 'true',
              payload: {
                image: IMAGE,
                sha: DEPLOY_SHA,
                triggered_by: context.eventName
              },
              description: `Deploy ${DEPLOY_SHA.slice(0, 7)} to ${ENVIRONMENT}`
            });

            // Seed a queued status pointing back at this run; the deployer
            // takes over from here (in_progress -> success/failure).
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'queued',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `Image ${IMAGE} ready for rollout`
            });

            core.notice(
              `Dispatched deployment ${deployment.id} of ${IMAGE} to ${ENVIRONMENT}`
            );

  # When a PR closes, retire its preview environment so stale deployments
  # don't accumulate in the Deployments UI.
  teardown-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Deactivate preview deployments
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          ENVIRONMENT: preview-pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const { ENVIRONMENT } = process.env;

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: ENVIRONMENT
              }
            );

            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
                description: 'PR closed; preview retired'
              });
            }

            core.notice(
              `Deactivated ${deployments.length} deployment(s) in ${ENVIRONMENT}`
            );
