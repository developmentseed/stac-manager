apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stac-manager.fullname" . }}
  labels:
    {{- include "stac-manager.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "stac-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "stac-manager.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "stac-manager.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort | default .Values.service.port }}
              protocol: TCP
          env:
          - name: REACT_APP_STAC_API
            value: {{ .Values.stacApi | required "Please provide a value for stacApi" }}
          - name: PUBLIC_URL
            value: {{ .Values.publicUrl | required "Please provide a value for publicUrl" }}
          {{ if .Values.stacBrowser }}
          - name: REACT_APP_STAC_BROWSER
            value: {{ .Values.stacBrowser }}
          {{ end }}
          {{ if .Values.oidc }}
          {{- $authority := .Values.oidc.authority }}
          {{- if and (not $authority) .Values.oidc.providerUrl .Values.oidc.realm }}
          {{- $authority = printf "%s/realms/%s" (trimSuffix "/" .Values.oidc.providerUrl) .Values.oidc.realm }}
          {{- end }}
          - name: REACT_APP_OIDC_AUTHORITY
            value: {{ $authority | required "Please provide .Values.oidc.authority (or legacy .Values.oidc.providerUrl + .Values.oidc.realm)" }}
          - name: REACT_APP_OIDC_CLIENT_ID
            value: {{ .Values.oidc.clientId | required "Please provide a value for oidc.clientId" }}
          {{ end }}
          {{ if .Values.appTitle }}
          - name: APP_TITLE
            value: {{ .Values.appTitle }}
          {{ end }}
          {{ if .Values.appDescription }}
          - name: APP_DESCRIPTION
            value: {{ .Values.appDescription }}
          {{ end }}
          {{ if .Values.primaryColor }}
          - name: REACT_APP_THEME_PRIMARY_COLOR
            value: {{ .Values.primaryColor }}
          {{ end }}
          {{ if .Values.secondaryColor }}
          - name: REACT_APP_THEME_SECONDARY_COLOR
            value: {{ .Values.secondaryColor }}
          {{ end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
