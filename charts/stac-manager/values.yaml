replicaCount: 1

image:
  repository: ghcr.io/developmentseed/stac-manager
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 120
  timeoutSeconds: 15
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  timeoutSeconds: 15
  periodSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

# OIDC authentication configuration (optional).
# When omitted, authentication is disabled.
#
# oidc:
#   # Preferred: the OIDC issuer/authority URL. For Keycloak this is
#   # <keycloak-url>/realms/<realm>.
#   authority: https://iam.example.com/realms/my-realm
#   clientId: my-client
#
#   # Legacy (deprecated): supported for backwards compatibility. If `authority`
#   # is not set, it will be derived as "{providerUrl}/realms/{realm}".
#   # providerUrl: https://iam.example.com
#   # realm: my-realm
