<!doctype html>
<html lang='en'>

<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, shrink-to-fit=no'>

  <link rel="icon" href="/meta/favicon.png" type='image/png' sizes="32x32">
  <link rel="icon" href="/meta/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/meta/apple-touch-icon.png">
  <link rel="manifest" href="/meta/manifest.webmanifest">

  <meta property="og:image" content='/meta/meta-image.png'>
  <meta name="twitter:image" content='/meta/meta-image.png'>
  <meta property='og:url' content='/'>

  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>

  <title>STAC Manager</title>
  <meta name='title' content='STAC Manager'>
  <meta name='description' content='STAC Manager'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <style>
    #welcome-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: #fff;
      margin: 0;
      padding: 1rem;
      font-family: sans-serif;
      font-size: 1rem;

      transition: all 320ms ease-in-out;
    }

    #welcome-banner h1 {
      height: 3rem;
    }

    #welcome-banner.dismissed {
      opacity: 0;
      visibility: hidden;
    }

    .loading {
      margin-top: 2rem;
      opacity: 0.64;
    }
  </style>
</head>

<body>
  <!-- Welcome banner gets hidden by React -->
  <div id='welcome-banner'>
    <div>
      <h1><img src='/media/layout/logo.svg' alt='logotype' width='188' height='32' /></h1>
      <p>In the beginning the Universe was created.</p>
      <p>This has made a lot of people very angry and been widely regarded as a bad move.</p>
    </div>
  </div>

  <div id='app-container'>
    <!-- Content rendered here via React -->
  </div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
